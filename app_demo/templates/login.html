{% extends "base.html" %}
{% block title %}EcoHub Demo - Đăng nhập{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-5">
    <div class="card login-card card-ecohub">
      <div class="card-body">
        <h1 class="text-center">EcoHub</h1>
        <p class="text-center text-muted small mb-4">Đăng nhập demo</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control form-control-lg" placeholder="Nhập tên đăng nhập" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Nhập mật khẩu" required>
          </div>
          <button type="submit" class="btn btn-ecohub btn-lg w-100">Đăng nhập</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
