<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}EcoHub Demo{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  </head>
  <body>
    {% block nav %}
    <nav class="navbar navbar-expand-lg navbar-dark navbar-ecohub">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">EcoHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
          <div class="navbar-nav">
            <a class="nav-link {{ 'active' if request.endpoint == 'dashboard' }}" href="{{ url_for('dashboard') }}">Dashboard</a>
            <a class="nav-link {{ 'active' if request.endpoint == 'record_page' }}" href="{{ url_for('record_page') }}">Quay video</a>
            <a class="nav-link {{ 'active' if request.endpoint == 'camera_settings' }}" href="{{ url_for('camera_settings') }}">Cài đặt camera</a>
            <a class="nav-link {{ 'active' if request.endpoint == 'storage_page' }}" href="{{ url_for('storage_page') }}">Kho lưu trữ</a>
          </div>
        </div>
      </div>
    </nav>
    {% endblock %}
    <main class="container py-4">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="mb-3">
            {% for msg in messages %}
              <div class="alert alert-ecohub alert-info">{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    
    <!-- Toast container cho thông báo "In xong" -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toastBody">In xong</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
