{% extends "base.html" %}
{% block title %}EcoHub - Đặt lại mật khẩu{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="row justify-content-center py-5 auth-page-wrap">
  <div class="col-md-5">
    <div class="card login-card card-ecohub">
      <div class="card-body">
        <h1 class="text-center">EcoHub</h1>
        <p class="text-center text-muted small mb-4">Tạo mật khẩu mới cho tài khoản của bạn</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Mật khẩu mới</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text auth-input-addon"><i class="bi bi-lock"></i></span>
              <input id="new-password" type="password" name="password" class="form-control auth-input" placeholder="Nhập mật khẩu mới" required>
              <button class="btn auth-toggle-password" type="button" data-target="#new-password" aria-label="Ẩn/hiện mật khẩu">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <small class="text-muted">Tối thiểu 8 ký tự, gồm chữ hoa, số và ký tự đặc biệt.</small>
          </div>
          <div class="mb-4">
            <label class="form-label">Nhập lại mật khẩu</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text auth-input-addon"><i class="bi bi-shield-lock"></i></span>
              <input id="new-password-confirm" type="password" name="password_confirm" class="form-control auth-input" placeholder="Nhập lại mật khẩu" required>
              <button class="btn auth-toggle-password" type="button" data-target="#new-password-confirm" aria-label="Ẩn/hiện mật khẩu">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-ecohub btn-lg w-100">Cập nhật mật khẩu</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
  (function () {
    const toggles = document.querySelectorAll(".auth-toggle-password");
    toggles.forEach((btn) => {
      btn.addEventListener("click", () => {
        const target = document.querySelector(btn.getAttribute("data-target"));
        if (!target) return;
        const icon = btn.querySelector("i");
        const isPassword = target.type === "password";
        target.type = isPassword ? "text" : "password";
        if (icon) {
          icon.classList.toggle("bi-eye", !isPassword);
          icon.classList.toggle("bi-eye-slash", isPassword);
        }
      });
    });
  })();
</script>
{% endblock %}
