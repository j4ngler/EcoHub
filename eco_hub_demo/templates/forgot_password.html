{% extends "base.html" %}
{% block title %}EcoHub - Quên mật khẩu{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="row justify-content-center py-5 auth-page-wrap">
  <div class="col-md-5">
    <div class="card login-card card-ecohub">
      <div class="card-body">
        <h1 class="text-center">EcoHub</h1>
        <p class="text-center text-muted small mb-4">Nhập email đã đăng ký để nhận link đặt lại mật khẩu</p>
        <form method="post">
          <div class="mb-4">
            <label class="form-label">Email</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text auth-input-addon"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control auth-input" placeholder="you@company.com" required>
            </div>
          </div>
          <button type="submit" class="btn btn-ecohub btn-lg w-100">Gửi link đặt lại mật khẩu</button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('login') }}">Quay lại đăng nhập</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
