version: '3.8'

# Production Docker Compose configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/cache.conf:/etc/nginx/conf.d/cache.conf:ro
      - ./nginx/conf.d/security.conf:/etc/nginx/conf.d/security.conf:ro
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    restart: always
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your-secure-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-your-redis-password}
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/ecohub?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://101.99.38.74}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://101.99.38.74}
      - TIKTOK_SERVICE_ID=${TIKTOK_SERVICE_ID:-7604636951182493460}
      - TIKTOK_APP_KEY=${TIKTOK_APP_KEY}
      - TIKTOK_APP_SECRET=${TIKTOK_APP_SECRET}
      - SHOPEE_ENV=${SHOPEE_ENV:-live}
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
      - SHOPEE_TEST_API_BASE_URL=${SHOPEE_TEST_API_BASE_URL:-https://openplatform.sandbox.test-stable.shopee.sg}
      - SHOPEE_TEST_AUTH_BASE_URL=${SHOPEE_TEST_AUTH_BASE_URL:-https://open.sandbox.test-stable.shopee.com/auth}
      - SHOPEE_TEST_REDIRECT_URL=${SHOPEE_TEST_REDIRECT_URL:-http://101.99.38.74/api/auth/shopee/callback}
      - SHOPEE_LIVE_PARTNER_ID=${SHOPEE_LIVE_PARTNER_ID}
      - SHOPEE_LIVE_PARTNER_KEY=${SHOPEE_LIVE_PARTNER_KEY}
      - SHOPEE_LIVE_API_BASE_URL=${SHOPEE_LIVE_API_BASE_URL:-https://partner.shopeemobile.com}
      - SHOPEE_LIVE_AUTH_BASE_URL=${SHOPEE_LIVE_AUTH_BASE_URL:-https://open.shopee.com/auth}
      - SHOPEE_LIVE_REDIRECT_URL=${SHOPEE_LIVE_REDIRECT_URL:-https://101.99.38.74/api/auth/shopee/callback}
      - SHOPEE_TOKEN_REFRESH_ENABLED=${SHOPEE_TOKEN_REFRESH_ENABLED:-true}
      - SHOPEE_PUSH_CALLBACK_TOKEN=${SHOPEE_PUSH_CALLBACK_TOKEN}
      - VIDEO_STORAGE_LIMIT_GB=100
    command: npm start
    restart: always
    volumes:
      - ./uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    # In production, frontend is served by nginx as static files
    # This service is not needed
    profiles:
      - donotstart

volumes:
  postgres_data:
  redis_data:
  nginx_cache:
