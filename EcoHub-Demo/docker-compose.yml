services:
  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ecohub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ecohub-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecohub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecohub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecohub-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecohub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecohub-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecohub-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ecohub?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=your-refresh-secret-key-change-in-production
      - FRONTEND_URL=${FRONTEND_URL:-http://101.99.38.74}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://101.99.38.74}
      - SHOPEE_ENV=${SHOPEE_ENV:-test}
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
      - SHOPEE_TEST_API_BASE_URL=${SHOPEE_TEST_API_BASE_URL:-https://openplatform.sandbox.test-stable.shopee.sg}
      - SHOPEE_TEST_AUTH_BASE_URL=${SHOPEE_TEST_AUTH_BASE_URL:-https://open.sandbox.test-stable.shopee.com/auth}
      - SHOPEE_TEST_REDIRECT_URL=${SHOPEE_TEST_REDIRECT_URL:-http://101.99.38.74/api/auth/shopee/callback}
      - SHOPEE_LIVE_PARTNER_ID=${SHOPEE_LIVE_PARTNER_ID}
      - SHOPEE_LIVE_PARTNER_KEY=${SHOPEE_LIVE_PARTNER_KEY}
      - SHOPEE_LIVE_API_BASE_URL=${SHOPEE_LIVE_API_BASE_URL:-https://partner.shopeemobile.com}
      - SHOPEE_LIVE_AUTH_BASE_URL=${SHOPEE_LIVE_AUTH_BASE_URL:-https://open.shopee.com/auth}
      - SHOPEE_LIVE_REDIRECT_URL=${SHOPEE_LIVE_REDIRECT_URL:-https://101.99.38.74/api/auth/shopee/callback}
      - SHOPEE_TOKEN_REFRESH_ENABLED=${SHOPEE_TOKEN_REFRESH_ENABLED:-true}
      - SHOPEE_PUSH_CALLBACK_TOKEN=${SHOPEE_PUSH_CALLBACK_TOKEN}
      # Video storage (GB) used for dashboard percentage
      - VIDEO_STORAGE_LIMIT_GB=100
      # Email Configuration
      - MAIL_MAILER=smtp
      - MAIL_HOST=e2.vinahost.vn
      - MAIL_PORT=465
      - MAIL_USERNAME=dev@ecotel.com.vn
      - MAIL_PASSWORD=EcotelEmail
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=dev@ecotel.com.vn
      - MAIL_FROM_NAME=ecotel
      - MAIL_REPLY_ADDRESS=dev@ecotel.com.vn
      - MAIL_REPLY_NAME=ecotel
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecohub-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecohub-frontend
    environment:
      - VITE_API_URL=/api
      # Proxy /api và /uploads tới backend khi chạy trong Docker
      - VITE_PROXY_TARGET=http://backend:3000
      - VITE_PUBLIC_HOST=${VITE_PUBLIC_HOST:-101.99.38.74}
      - VITE_HMR_PROTOCOL=${VITE_HMR_PROTOCOL:-wss}
      - VITE_HMR_CLIENT_PORT=${VITE_HMR_CLIENT_PORT:-443}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ecohub-network

networks:
  ecohub-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_cache:
